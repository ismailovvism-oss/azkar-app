<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Азкары</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#F5EFE3">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Азкары">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5EFE3;
    --surface: #FFFFFF;
    --ink: #1F1A14;
    --ink-muted: #7A6F5C;
    --accent: #8B5E34;
    --accent-soft: #EEE0CC;
    --gold: #B5895A;
    --success: #4A6B47;
    --success-soft: #DCE7D6;
    --error: #8B3A2E;
    --error-soft: #F0DDD7;
    --border: #E8DECB;
    --display: 'Cormorant Garamond', Georgia, serif;
    --body: 'DM Sans', system-ui, sans-serif;
    --arabic: 'Amiri', 'Scheherazade New', 'Times New Roman', serif;
  }

  /* === ЦВЕТОВЫЕ СХЕМЫ ===
     Палитра целиком вынесена в переменные :root (выше — «Кремовая» по
     умолчанию). Схема выбирается атрибутом html[data-theme=…] (см. applyTheme).
     Все схемы держатся одного принципа: тёплая, бумажная, сдержанная.
     Никакого кича — только смена температуры и светлоты бумаги и акцента.
     Источник истины по цвету шапки/манифеста — массив THEMES в JS. */

  /* Заря — тёплый рассвет, пыльная роза */
  html[data-theme="dawn"] {
    --bg: #F7EBE4;
    --surface: #FFFBF8;
    --ink: #2A1F1A;
    --ink-muted: #897068;
    --accent: #A65A4C;
    --accent-soft: #F1DBD2;
    --gold: #BE8A6C;
    --success: #5C7050;
    --success-soft: #DDE6D2;
    --error: #97382C;
    --error-soft: #F2D9D2;
    --border: #EDD9CF;
  }

  /* Сумерки — приглушённый вечерний мововый тон */
  html[data-theme="twilight"] {
    --bg: #EEE8EC;
    --surface: #FBF8FA;
    --ink: #25202A;
    --ink-muted: #756B79;
    --accent: #7C5E78;
    --accent-soft: #E4DAE4;
    --gold: #A98BA0;
    --success: #5A6E5C;
    --success-soft: #DCE5DC;
    --error: #8E3A40;
    --error-soft: #EED7D8;
    --border: #E0D6DF;
  }

  /* Ночь — тёплая тёмная бумага для чтения в темноте.
     Светлота инвертирована, но температура та же тёплая. */
  html[data-theme="night"] {
    --bg: #1B1714;
    --surface: #25201A;
    --ink: #ECE2D1;
    --ink-muted: #9C907A;
    --accent: #CC9E72;
    --accent-soft: #3A2F22;
    --gold: #C9A36B;
    --success: #8FAE7F;
    --success-soft: #2C3A28;
    --error: #D98C7C;
    --error-soft: #3E2823;
    --border: #3A3127;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); }
  body {
    font-family: var(--body);
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 20px 60px;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }
  button { font-family: inherit; cursor: pointer; }
  #app { max-width: 600px; margin: 0 auto; }

  .muted { color: var(--ink-muted); }
  .center { text-align: center; }

  /* === ОБЩЕЕ === */
  .back-btn {
    background: transparent;
    border: none;
    font-size: 14px;
    color: var(--ink-muted);
    padding: 8px 8px 8px 0;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .back-btn:hover { color: var(--ink); }

  .dots-divider {
    text-align: center;
    color: var(--gold);
    letter-spacing: 0.6em;
    margin: 28px 0 24px;
    font-size: 14px;
    opacity: 0.7;
    user-select: none;
  }

  /* === MIGRATION BANNER === */
  .migration-banner {
    position: relative;
    background: var(--accent-soft);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 14px 36px 14px 16px;
    margin-bottom: 22px;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink);
  }
  .migration-banner-title {
    font-family: var(--display);
    font-weight: 600;
    font-size: 16px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .migration-banner ul {
    margin: 4px 0 6px 0;
    padding-left: 18px;
  }
  .migration-banner li { margin-bottom: 2px; }
  .migration-banner-foot { color: var(--ink-muted); margin-top: 6px; }
  .migration-banner-close {
    position: absolute;
    top: 8px; right: 10px;
    background: transparent;
    border: none;
    color: var(--ink-muted);
    font-size: 16px;
    line-height: 1;
    padding: 4px 6px;
  }
  .migration-banner-close:hover { color: var(--ink); }

  /* === HOME === */
  .home-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 28px;
  }
  .home-head-text { flex: 1; min-width: 0; }
  .gear-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 999px;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-muted);
    font-size: 18px;
    line-height: 1;
    margin-top: 4px;
    transition: border-color 0.15s, color 0.15s;
  }
  .gear-btn:hover { border-color: var(--gold); color: var(--accent); }
  .greet-line {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 10px;
    line-height: 1.2;
  }
  .greet-arabic {
    font-family: var(--arabic);
    font-size: 28px;
    font-weight: 400;
    color: var(--ink);
  }
  .greet-name {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 500;
    font-style: italic;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .greet-name::before {
    content: '·';
    color: var(--gold);
    margin-right: 10px;
    font-style: normal;
  }
  .greet-date {
    color: var(--ink-muted);
    font-size: 14px;
    margin-top: 10px;
  }

  .section-list { display: flex; flex-direction: column; gap: 12px; }
  .section-card {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    transition: border-color 0.15s, transform 0.08s;
  }
  .section-card:hover { border-color: var(--gold); }
  .section-card:active { transform: scale(0.995); }
  .section-card.done-today { background: var(--bg); }
  .section-title {
    font-family: var(--display);
    font-weight: 600;
    font-size: 22px;
    line-height: 1.15;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .section-sub {
    color: var(--ink-muted);
    font-size: 13.5px;
    margin-top: 3px;
  }
  .section-progress {
    color: var(--gold);
    font-size: 13px;
    margin-top: 10px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .section-progress.complete { color: var(--success); }

  .letter-link {
    display: block;
    width: 100%;
    text-align: center;
    background: transparent;
    border: none;
    color: var(--ink);
    font-family: var(--display);
    font-style: italic;
    font-size: 19px;
    font-weight: 500;
    padding: 10px;
    letter-spacing: -0.005em;
  }
  .letter-link:hover { color: var(--accent); }
  .letter-link .env { color: var(--accent); margin-right: 8px; }

  /* Предисловие автора вверху главной (публичный режим) */
  .home-preface { margin-bottom: 4px; }
  .home-preface-body {
    font-family: var(--display);
    font-size: 18px;
    line-height: 1.6;
    color: var(--ink);
    white-space: pre-wrap;
  }
  .home-help-link {
    display: inline-block;
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: var(--body);
    font-size: 13.5px;
    font-weight: 500;
    padding: 12px 0 0;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .home-help-link:hover { color: var(--ink); }

  /* Призыв «Предложи свой зикр или функцию» внизу главной */
  .feedback-link {
    display: block;
    width: 100%;
    text-align: center;
    background: transparent;
    border: none;
    color: var(--ink);
    font-family: var(--display);
    font-style: italic;
    font-size: 19px;
    font-weight: 500;
    padding: 10px;
    letter-spacing: -0.005em;
  }
  .feedback-link:hover { color: var(--accent); }
  .feedback-link .env { color: var(--accent); margin-right: 8px; font-style: normal; }

  /* === HELP (как пользоваться) === */
  .help-page { padding-top: 4px; }
  .help-intro {
    font-family: var(--display);
    font-style: italic;
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink-muted);
    margin-bottom: 24px;
  }
  .help-block { margin-bottom: 20px; }
  .help-block h3 {
    font-family: var(--display);
    font-weight: 600;
    font-size: 19px;
    line-height: 1.2;
    color: var(--ink);
    letter-spacing: -0.005em;
    margin-bottom: 4px;
  }
  .help-block p {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--ink-muted);
  }
  .help-block .ic {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }

  /* === FEEDBACK (предложи своё) === */
  .feedback-contact { margin-top: 4px; }
  .feedback-contact-label {
    font-size: 13px;
    color: var(--ink-muted);
    margin-bottom: 8px;
  }
  .feedback-email {
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 17px;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px;
    margin-bottom: 14px;
    user-select: all;
    -webkit-user-select: all;
    word-break: break-all;
  }
  .feedback-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .feedback-actions .name-submit { flex: 0 0 auto; }
  .feedback-copy-btn {
    width: auto;
    margin: 0;
  }
  .feedback-note {
    font-size: 13px;
    color: var(--success);
    margin-top: 12px;
    min-height: 18px;
  }

  /* === SECTION (список зикров) === */
  .section-head-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }
  .section-reset-btn {
    background: transparent;
    border: none;
    color: var(--ink-muted);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 8px;
    transition: color 0.15s;
  }
  .section-reset-btn:hover { color: var(--accent); }
  .section-head {
    margin-bottom: 18px;
  }
  .section-head h1 {
    font-family: var(--display);
    font-weight: 600;
    font-size: 28px;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .section-head .subtitle {
    color: var(--ink-muted);
    font-size: 14px;
    margin-top: 4px;
  }

  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item-card {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    text-align: left;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    transition: border-color 0.15s;
  }
  .item-card:hover { border-color: var(--gold); }
  .item-num {
    font-family: var(--display);
    font-weight: 500;
    font-size: 18px;
    color: var(--ink-muted);
    min-width: 24px;
    font-variant-numeric: tabular-nums;
  }
  .item-preview {
    font-size: 15px;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item-main {
    flex: 1;
    min-width: 0;
  }
  .item-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 2px;
  }
  .item-main.has-title .item-preview {
    color: var(--ink-muted);
    font-size: 13px;
  }
  .item-icons {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .item-check {
    font-size: 16px;
    color: var(--success);
    font-weight: 700;
  }
  .item-note-icon {
    font-size: 14px;
    line-height: 1;
    color: var(--accent);
  }
  .item-tag-xN {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-muted);
    font-variant-numeric: tabular-nums;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 6px;
    line-height: 1.3;
  }

  /* === ZIKR === */
  .zikr-meta {
    text-align: center;
    color: var(--ink-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
    margin-bottom: 22px;
  }
  .zikr-title {
    text-align: center;
    font-family: var(--display);
    font-size: 25px;
    font-weight: 600;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 18px;
  }

  .arabic-block {
    font-family: var(--arabic);
    font-size: 32px;
    font-weight: 400;
    line-height: 1.85;
    color: var(--ink);
    direction: rtl;
    text-align: center;
    margin: 0 auto 22px;
    max-width: 540px;
  }

  .transliteration {
    font-family: var(--display);
    font-size: 21px;
    font-weight: 500;
    color: var(--ink);
    text-align: center;
    line-height: 1.35;
    letter-spacing: -0.005em;
    margin-bottom: 14px;
  }

  .translation {
    font-family: var(--body);
    font-size: 15px;
    color: var(--ink-muted);
    text-align: center;
    line-height: 1.5;
    font-style: italic;
    max-width: 480px;
    margin: 0 auto 28px;
  }

  /* === АКТИВНАЯ ЗОНА ТАПА (текстовый блок) ===
     Тонкая ненавязчивая охровая рамка-индикатор + бейдж-дубль счётчика в углу.
     Рамка — псевдоэлемент с opacity, чтобы быть полупрозрачной независимо от
     hex-значения --accent. pointer-events:none — рамка не перехватывает тапы. */
  .tap-zone-active {
    position: relative;
    padding: 16px 18px;
    border-radius: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .tap-zone-active::after {
    content: "";
    position: absolute;
    inset: 0;
    border: 1.5px solid var(--accent);
    border-radius: 14px;
    opacity: 0.45;
    pointer-events: none;
  }
  .zone-badge {
    position: absolute;
    top: -12px;
    right: -6px;
    min-width: 28px;
    height: 26px;
    padding: 0 9px;
    border-radius: 999px;
    background: var(--accent);
    color: var(--surface);
    font-family: var(--display);
    font-weight: 600;
    font-size: 15px;
    line-height: 26px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    box-shadow: 0 0 0 3px var(--bg);
    z-index: 2;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.25s ease;
  }
  .zone-badge.done { background: var(--success); }

  /* Большой круглый таппер */
  .tapper-wrap { display: flex; justify-content: center; margin-bottom: 26px; }
  .tapper {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 1px solid var(--gold);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.25s ease, border-color 0.25s ease, transform 0.08s;
    user-select: none;
    -webkit-user-select: none;
    padding: 0;
  }
  .tapper:active { transform: scale(0.97); }
  .tapper.done {
    background: var(--success-soft);
    border-color: var(--success);
  }
  .tapper-count {
    font-family: var(--display);
    font-weight: 600;
    font-size: 92px;
    line-height: 1;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .tapper.done .tapper-count { color: var(--success); }
  .tapper-hint {
    font-size: 12.5px;
    color: var(--ink-muted);
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  .tapper.done .tapper-hint {
    color: var(--success);
    font-family: var(--display);
    font-style: italic;
    font-size: 17px;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
    margin-top: 8px;
  }

  /* Комментарий автора к зикру */
  .comment-card {
    background: var(--accent-soft);
    border: 1px solid var(--gold);
    border-left-width: 3px;
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 18px;
  }
  .comment-label {
    display: block;
    font-family: var(--body);
    font-style: normal;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .comment-body {
    font-family: var(--display);
    font-style: italic;
    font-size: 17px;
    line-height: 1.5;
    color: var(--ink);
    white-space: pre-line;
  }

  /* Личные заметки пользователя */
  .user-notes {
    margin-bottom: 22px;
  }
  .user-notes-label {
    display: block;
    font-family: var(--body);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .user-notes-area {
    width: 100%;
    min-height: 92px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    font-family: var(--body);
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .user-notes-area:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-soft);
  }
  .user-notes-area::placeholder {
    color: var(--ink-muted);
    font-style: italic;
    opacity: 0.7;
  }

  /* Источник и теги */
  .zikr-source {
    text-align: center;
    color: var(--ink-muted);
    font-size: 12.5px;
    margin: -16px auto 18px;
    max-width: 480px;
    line-height: 1.4;
  }
  .tags-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-bottom: 20px;
  }
  .tag-pill {
    border: 1px solid var(--border);
    color: var(--ink-muted);
    background: var(--surface);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 500;
  }

  /* Управление количеством повторов */
  .repeat-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 14px;
    color: var(--ink-muted);
    font-size: 13px;
  }
  .repeat-line strong {
    font-family: var(--display);
    font-style: italic;
    color: var(--accent);
    font-size: 17px;
    font-weight: 600;
    margin: 0 2px;
  }
  .icon-btn {
    background: transparent;
